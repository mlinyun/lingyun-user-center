spring:
  devtools:
    restart:
      enabled: true
  datasource:
    url: ${MYSQL_DATABASE_URL:jdbc:mysql://localhost:3306/user_center?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:user_center_user}
    password: ${MYSQL_PASSWORD:StrongPassword..1024}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:123456}
      database: ${REDIS_DATABASE:0}
      connect-timeout: 3000
  mail:
    host: ${MAIL_HOST}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    # 填写好上面的邮箱配置后，建议将 test-connection 设置为 true，测试连接是否成功，成功后再改回 false，避免每次启动都测试连接，影响性能
    test-connection: false

aliyun:
  sms:
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET}
    endpoint: ${ALIYUN_SMS_ENDPOINT:dypnsapi.aliyuncs.com}
    sign-name: ${ALIYUN_SMS_SIGN_NAME:云渚科技验证平台}
    code-length: ${ALIYUN_SMS_CODE_LENGTH:6}
    valid-time: ${ALIYUN_SMS_VALID_TIME:300}
    interval: ${ALIYUN_SMS_INTERVAL:60}

cos:
  client:
    host: ${COS_HOST}
    secretId: ${COS_SECRET_ID}
    secretKey: ${COS_SECRET_KEY}
    region: ${COS_REGION}
    bucket: ${COS_BUCKET}

logging:
  level:
    root: debug

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

knife4j:
  production: false
