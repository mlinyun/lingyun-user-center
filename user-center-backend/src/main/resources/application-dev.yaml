spring:
  devtools:
    restart:
      enabled: true
  datasource:
    url: ${MYSQL_DATABASE_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 0
      connect-timeout: 3000
  mail:
    host: ${MAIL_HOST}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    test-connection: true

aliyun:
  sms:
    access-key-id: your-access-key-id # 替换为你的 Access Key ID
    access-key-secret: your-access-key-secret # 替换为你的 Access Key Secret
    endpoint: dypnsapi.aliyuncs.com
    sign-name: your-sign-name # 替换为你的短信签名
    code-length: 6
    valid-time: 300
    interval: 60

cos:
  client:
    host: <your-custom-domain.com>
    secretId: <your-secret-id>
    secretKey: <your-secret-key>
    region: <your-region>
    bucket: <your-bucket-name>

logging:
  level:
    root: info

knife4j:
  production: false
