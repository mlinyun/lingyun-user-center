name: React Frontend CI/CD Workflow
run-name: React Frontend CI/CD Workflow triggered by ${{ github.actor }} on ${{ github.ref_name }} via ${{ github.event_name }}

on:
  push:
    paths:
      - "user-center-react-frontend/**"
      - ".github/workflows/cicd-react-frontend.yaml"
  pull_request:
    paths:
      - "user-center-react-frontend/**"
      - ".github/workflows/cicd-react-frontend.yaml"
  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Install, Lint and Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: user-center-react-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable Corepack and prepare pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.2 --activate

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "store_path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('user-center-react-frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm biome:lint

      - name: Generate UmiJS temporary files
        run: npx max setup

      - name: Type check
        run: pnpm tsc

      - name: Build
        run: pnpm build

      - name: Upload built frontend as artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: user-center-react-frontend/dist
